services:
  zero:
    image: dgraph/dgraph:latest
    container_name: dgraph-zero
    ports:
      - "5080:5080"
      - "6080:6080"
    volumes:
      - dgraph_zero:/dgraph
    command: dgraph zero --my=zero:5080

  alpha:
    image: dgraph/dgraph:latest
    container_name: dgraph-alpha
    ports:
      - "8080:8080" # HTTP API
      - "9080:9080" # gRPC API
    volumes:
      - dgraph_alpha:/dgraph
    command: dgraph alpha --my=alpha:7080 --zero=zero:5080 --security whitelist=0.0.0.0/0

  ratel:
    image: dgraph/ratel:latest
    container_name: dgraph-ratel
    ports:
      - "8000:8000"
    depends_on:
      - alpha
    command: dgraph-ratel

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: linkweaver-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"

  yente:
    image: ghcr.io/opensanctions/yente:latest
    container_name: linkweaver-yente
    depends_on:
      - elasticsearch
    environment:
      - YENTE_INDEX_URL=http://elasticsearch:9200
      - YENTE_MANIFEST=/app/manifests/civic.yml
    ports:
      - "8001:8000"
    command: ["yente", "serve"]

  yente-indexer:
    image: ghcr.io/opensanctions/yente:latest
    container_name: linkweaver-yente-indexer
    depends_on:
      - elasticsearch
    environment:
      - YENTE_INDEX_URL=http://elasticsearch:9200
      - YENTE_MANIFEST=/app/manifests/civic.yml
    command: ["yente", "reindex"]
    restart: "no"

volumes:
  dgraph_zero:
  dgraph_alpha:
  es_data:
